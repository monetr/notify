name: Testing
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Target branch to compare against (Bundle Analysis only)'
        required: false
        default: 'main'
        type: string
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint --reporter=github --error-on-warnings

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install
      - run: pnpm build
      - run: pnpm test -- --browser.name ${{ matrix.browser }}

  bundle-analysis:
    name: Bundle Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:analyze
      - uses: web-infra-dev/rsdoctor-action@2aaf6eac243da89d3d08618eb65491051874ad5d # V1.0.0
        with:
          file_path: 'dist/rsdoctor-data.json'
          target_branch: 'main'
          dispatch_target_branch: ${{ github.event.inputs.target_branch }}
